<aside class="w-64 h-[calc(100vh-64px)] border-r border-gray-200 bg-white p-4">

  <nav class="flex flex-col gap-2">
    @for (item of menuItems; track item.route){
      <a 
        [routerLink]="item.route"
        routerLinkActive="bg-blue-50 text-blue-600 font-medium"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 rounded-lg px-4 py-3 transition-all duration-200 hover:bg-slate-100 hover:text-blue-600"
        >
        <mat-icon>{{item.icon}}</mat-icon>
        <span>{{item.label}}</span>
      </a>

    }
  </nav>

</aside>
