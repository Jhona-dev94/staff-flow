<mat-card class="rounded-2xl p-6 transition-all duration-300 hover:-translate-y-1 hover:shadow-lg">

  <div class="flex items-center justify-between">

    <div>

      <p class="text-sm font-medium text-slate-500">
        {{ title() }}
      </p>

      <h2 class="mt-2 text-4xl font-bold text-slate-800">
        {{ value() }}
      </h2>

    </div>

    <div class="flex h-14 w-14 items-center justify-center rounded-full bg-blue-100">

      <mat-icon class="text-blue-600">
        {{ icon() }}
      </mat-icon>

    </div>

  </div>

</mat-card>
