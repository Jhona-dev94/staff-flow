<div class="rounded-xl border overflow-hidden">

<table mat-table [dataSource]="dataSource" matSort class="w-full">

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
    <td mat-cell *matCellDef="let e">{{e.name}}</td>
  </ng-container>

  <ng-container matColumnDef="position">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Position</th>
    <td mat-cell *matCellDef="let e">{{e.position}}</td>
  </ng-container>

  <ng-container matColumnDef="department">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Department</th>
    <td mat-cell *matCellDef="let e">{{e.department}}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let e">

      @if(e.status==='Active'){
        <span class="rounded-full bg-green-100 text-green-700 px-3 py-1 text-xs">
          Active
        </span>
      }@else{
        <span class="rounded-full bg-red-100 text-red-700 px-3 py-1 text-xs">
          Inactive
        </span>
      }

    </td>
  </ng-container>

  <ng-container matColumnDef="actions">

    <th mat-header-cell *matHeaderCellDef>Actions</th>

    <td mat-cell *matCellDef="let e">

      <button mat-icon-button>
        <mat-icon>edit</mat-icon>
      </button>

      <button mat-icon-button color="warn">
        <mat-icon>delete</mat-icon>
      </button>

    </td>

  </ng-container>

<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

<tr mat-row *matRowDef="let row;columns:displayedColumns"></tr>

</table>

<mat-paginator
pageSize="5"
[pageSizeOptions]="[5,10,20]">
</mat-paginator>

</div>
