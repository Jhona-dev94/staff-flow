<div class="space-y-8">

  <div class="flex items-center justify-between">

    <div>

      <h1 class="text-3xl font-bold">
        Employees
      </h1>

      <p class="text-slate-500">
        Manage your organization's employees.
      </p>

    </div>

    <button
  mat-flat-button
  color="primary"
  (click)="openDialog()">

  <mat-icon>add</mat-icon>

  Add Employee

</button>

  </div>
  <app-search-bar
  placeholder="Search employees..."
  (search)="table.filter($event)">
</app-search-bar>

<app-employee-table
  #table
  [employees]="employees()"
  (editEmployee)="edit($event)"
  (deleteEmployee)="delete($event)">
</app-employee-table>
</div>
