<div class="space-y-8">
  <div>
    <h1 class="text-3xl font-bold">
      Welcome back 👋
    </h1>

    <p class="text-slate-500">
      Here's what's happening today.
    </p>

  </div>

  <div class="grid gap-6 md:grid-cols-3">

    @for (stat of stats(); track stat.title){

      <app-stat-card
        [title]="stat.title"
        [value]="stat.value"
        [icon]="stat.icon">
      </app-stat-card>
    }

  </div>
  <section class="mt-10">

  <h2 class="mb-4 text-2xl font-semibold">
    Recent Activity
  </h2>

  <div class="rounded-2xl border border-slate-200 bg-white">

    @for (activity of recentActivities(); track activity.user) {

      <div
        class="flex items-center justify-between border-b border-slate-100 p-4 last:border-b-0">

        <div>

          <p class="font-medium">
            {{ activity.user }}
          </p>

          <p class="text-sm text-slate-500">
            {{ activity.action }}
          </p>

        </div>

        <mat-icon>
          chevron_right
        </mat-icon>

      </div>

    }

  </div>

</section>
</div>
